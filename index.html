<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>后悔小卖部 · 专治嘴硬内耗想太多</title>
<style>
@import url('https://fonts.googleapis.com/css2?family=Ma+Shan+Zheng&display=swap');
:root{
  --bg:#060d08;--bg2:#0a1410;--card:#0f1a12;--card2:#162018;
  --zhu:#9b2335;--zhu2:#d4455a;--zhu3:#ff8080;
  --qing:#1a3570;--qing2:#4a7fd4;--qing3:#a0c8ff;
  --gold:#c9a34a;--gold2:#e8c96a;--gold3:#fff3c0;
  --text:#f0e6d0;--muted:#7a6a50;--dim:#3a2e20;
  --border:rgba(201,163,74,0.2);
  --zhu-glow:rgba(155,35,53,0.4);--qing-glow:rgba(26,53,112,0.5);
  --gold-glow:rgba(201,163,74,0.35);
}
*{box-sizing:border-box;margin:0;padding:0}
html{scroll-behavior:smooth}
body{background:var(--bg);color:var(--text);font-family:'PingFang SC','Hiragino Sans GB','Microsoft YaHei',sans-serif;min-height:100vh;overflow-x:hidden;position:relative}

/* ── 星尘背景 ── */
#stardust{position:fixed;inset:0;pointer-events:none;z-index:0;overflow:hidden}
.star{position:absolute;border-radius:50%;animation:twinkle var(--d) ease-in-out infinite var(--delay)}
@keyframes twinkle{0%,100%{opacity:0.1;transform:scale(1)}50%{opacity:0.7;transform:scale(1.3)}}





/* ── 月亮 ── */
#moon{position:fixed;top:60px;right:80px;width:90px;height:90px;border-radius:50%;background:radial-gradient(circle at 35% 35%,rgba(255,248,220,0.12) 0%,rgba(201,163,74,0.06) 40%,transparent 70%);border:1px solid rgba(255,248,220,0.08);box-shadow:0 0 40px rgba(255,248,220,0.06),0 0 80px rgba(201,163,74,0.04);pointer-events:none;z-index:0;animation:moonpulse 6s ease-in-out infinite}
@keyframes moonpulse{0%,100%{opacity:0.7;transform:scale(1)}50%{opacity:1;transform:scale(1.04)}}
/* 月晕 */
#moon::before{content:'';position:absolute;inset:-20px;border-radius:50%;background:radial-gradient(circle,rgba(255,248,220,0.04) 0%,transparent 60%)}
/* 竹影 */


/* ── 云纹装饰 ── */
.cloud-deco{position:fixed;pointer-events:none;z-index:0;opacity:0.04}
.cloud-deco svg{fill:var(--gold)}

/* ── 音乐按钮 ── */
#music-btn{position:fixed;top:12px;right:20px;z-index:60;width:32px;height:32px;border-radius:50%;background:rgba(201,163,74,0.12);border:1px solid rgba(201,163,74,0.25);color:var(--gold);font-size:14px;cursor:pointer;transition:all 0.2s;display:flex;align-items:center;justify-content:center}
#music-btn:hover{background:rgba(201,163,74,0.22);border-color:var(--gold)}

/* ── 全局层 ── */
.page{display:none;position:relative;z-index:1;min-height:100vh}
.page.active{display:flex;flex-direction:column}

/* ══════════════════════════════
   INTRO SCREEN
══════════════════════════════ */
#p-intro{align-items:center;justify-content:center;text-align:center;background:var(--bg)}
.intro-inner{padding:40px 20px;display:flex;flex-direction:column;align-items:center;gap:0}
.ink-circle{width:180px;height:180px;border-radius:50%;background:radial-gradient(circle,rgba(155,35,53,0.15) 0%,rgba(26,92,82,0.1) 50%,transparent 70%);display:flex;align-items:center;justify-content:center;margin-bottom:24px;position:relative;animation:breathe 4s ease-in-out infinite}
@keyframes breathe{0%,100%{box-shadow:0 0 40px rgba(155,35,53,0.2),0 0 80px rgba(26,92,82,0.1)}50%{box-shadow:0 0 80px rgba(155,35,53,0.4),0 0 120px rgba(26,53,112,0.2)}}
.ink-circle .shop-ico{font-size:72px;filter:drop-shadow(0 0 20px rgba(201,163,74,0.6))}
.intro-title{font-size:52px;font-weight:900;letter-spacing:10px;color:var(--gold);text-shadow:0 0 40px var(--gold-glow),0 0 80px rgba(201,163,74,0.2);margin-bottom:8px;line-height:1.1}
.intro-seal{font-size:11px;letter-spacing:4px;color:var(--muted);margin-bottom:6px;border:1px solid var(--dim);padding:3px 16px;border-radius:2px;display:inline-block}
.intro-tagline{font-size:15px;color:var(--text);line-height:1.9;margin-bottom:40px}
.intro-tagline em{color:var(--gold2);font-style:normal}
.intro-divider{width:180px;height:1px;background:linear-gradient(90deg,transparent,var(--gold),transparent);margin-bottom:32px}

/* 药丸入口 */
.pill-row{display:flex;gap:20px;justify-content:center;flex-wrap:wrap;margin-bottom:32px}
.pill-btn{position:relative;width:148px;padding:24px 16px;border-radius:16px;cursor:pointer;border:1px solid transparent;transition:all 0.35s;overflow:hidden;background:var(--card)}
.pill-btn::before{content:'';position:absolute;inset:0;opacity:0;transition:opacity 0.3s;border-radius:16px}
.pill-btn.zhu{border-color:rgba(155,35,53,0.35)}
.pill-btn.zhu::before{background:radial-gradient(ellipse at 50% 0%,rgba(155,35,53,0.25),transparent 70%)}
.pill-btn.qing{border-color:rgba(26,53,112,0.45)}
.pill-btn.qing::before{background:radial-gradient(ellipse at 50% 0%,rgba(26,53,112,0.3),transparent 70%)}
.pill-btn:hover::before{opacity:1}
.pill-btn:hover.zhu{border-color:var(--zhu2);box-shadow:0 16px 48px var(--zhu-glow),inset 0 1px 0 rgba(255,128,128,0.1);transform:translateY(-5px)}
.pill-btn:hover.qing{border-color:var(--qing2);box-shadow:0 16px 48px var(--qing-glow),inset 0 1px 0 rgba(160,200,255,0.15);transform:translateY(-5px)}
.pill-ico{font-size:36px;margin-bottom:10px;display:block;filter:drop-shadow(0 4px 12px currentColor)}
.pill-nm{font-size:22px;font-weight:800;letter-spacing:3px;margin-bottom:8px}
.pill-btn.zhu .pill-nm{color:var(--zhu3)}
.pill-btn.qing .pill-nm{color:var(--qing3)}
.pill-sub{font-size:13px;color:var(--muted);line-height:1.7}
.pill-tag{font-size:12px;margin-top:12px;padding:4px 14px;border-radius:10px;display:inline-block;letter-spacing:1px}
.pill-btn.zhu .pill-tag{background:rgba(155,35,53,0.15);color:var(--zhu2)}
.pill-btn.qing .pill-tag{background:rgba(26,53,112,0.15);color:var(--qing2)}

.btn-pool-peek{background:rgba(201,163,74,0.1);border:1px solid rgba(201,163,74,0.6);color:var(--gold2);padding:12px 34px;border-radius:20px;cursor:pointer;font-size:15px;transition:all 0.25s;letter-spacing:2px;text-shadow:0 0 12px rgba(201,163,74,0.5)}
.btn-pool-peek:hover{border-color:var(--gold);background:rgba(201,163,74,0.2);color:var(--gold3);transform:translateY(-2px)}

/* ══════════════════════════════
   QUIZ
══════════════════════════════ */
#p-quiz{padding:52px 20px 80px;max-width:580px;margin:0 auto;width:100%}
.qz-top{text-align:center;margin-bottom:28px}
.qz-badge{display:inline-block;padding:4px 18px;border-radius:20px;font-size:11px;letter-spacing:2px;margin-bottom:10px}
.qz-badge.zhu{background:rgba(155,35,53,0.2);color:var(--zhu2);border:1px solid rgba(155,35,53,0.3)}
.qz-badge.qing{background:rgba(26,53,112,0.2);color:var(--qing2);border:1px solid rgba(26,53,112,0.35)}
.qz-h{font-size:18px;color:var(--gold);letter-spacing:3px;font-weight:800}

.prog-wrap{margin-bottom:28px}
.prog-labels{display:flex;justify-content:space-between;font-size:11px;color:var(--muted);margin-bottom:6px}
.prog-track{height:3px;background:var(--card2);border-radius:2px;overflow:hidden}
.prog-fill{height:100%;background:linear-gradient(90deg,var(--zhu2),var(--gold2));border-radius:2px;transition:width 0.4s ease}

.qz-question{font-size:17px;font-weight:600;line-height:1.7;margin-bottom:20px;color:var(--text)}
.qz-question .qnum{color:var(--muted);font-size:13px;font-weight:400;margin-right:8px}
.opts-list{display:flex;flex-direction:column;gap:10px}
.opt-item{background:var(--card);border:1px solid var(--border);border-radius:12px;padding:13px 16px;cursor:pointer;transition:all 0.2s;text-align:left;color:var(--text);font-size:14px;line-height:1.5;position:relative;overflow:hidden}
.opt-item::before{content:'';position:absolute;left:0;top:0;bottom:0;width:3px;background:var(--gold);opacity:0;transition:opacity 0.2s;border-radius:2px 0 0 2px}
.opt-item:hover{border-color:rgba(201,163,74,0.4);background:var(--card2);transform:translateX(3px)}
.opt-item:hover::before{opacity:0.5}
.opt-item.chosen{background:rgba(201,163,74,0.08);border-color:var(--gold);color:var(--gold2)}
.opt-item.chosen::before{opacity:1}
.opt-key{color:var(--gold);font-weight:700;margin-right:8px;font-size:13px}

.btn-next-qz{margin-top:20px;width:100%;padding:14px;background:linear-gradient(135deg,var(--gold),#8a6020);border:none;border-radius:12px;color:#08060e;font-size:15px;font-weight:800;cursor:pointer;transition:all 0.25s;letter-spacing:2px;opacity:0.4;pointer-events:none}
.btn-next-qz.on{opacity:1;pointer-events:all}
.btn-next-qz.on:hover{transform:translateY(-2px);box-shadow:0 8px 32px var(--gold-glow)}
.btn-back-qz{display:block;width:100%;text-align:center;background:none;border:none;color:var(--muted);font-size:12px;cursor:pointer;margin-top:10px;letter-spacing:1px}
.btn-back-qz:hover{color:var(--text)}

/* ══════════════════════════════
   RESULT
══════════════════════════════ */
#p-result{padding:52px 20px 80px;max-width:620px;margin:0 auto;width:100%}
.result-scroll{background:linear-gradient(180deg,var(--card) 0%,var(--bg2) 100%);border:1px solid var(--border);border-radius:20px;padding:32px 24px;position:relative;overflow:hidden;margin-bottom:20px}
.result-scroll::before{content:'';position:absolute;top:0;left:0;right:0;height:4px;background:linear-gradient(90deg,var(--zhu),var(--gold),var(--qing2))}
.rs-deco-top{text-align:center;margin-bottom:24px}
.beast-ico{font-size:76px;display:block;margin-bottom:12px;filter:drop-shadow(0 0 24px var(--gold-glow));animation:hover-beast 3s ease-in-out infinite}
@keyframes hover-beast{0%,100%{transform:translateY(0) scale(1)}50%{transform:translateY(-6px) scale(1.04)}}
.beast-label{font-size:11px;color:var(--muted);letter-spacing:3px;margin-bottom:4px}
.beast-nm{font-size:38px;font-weight:900;letter-spacing:6px;color:var(--gold2);text-shadow:0 0 30px var(--gold-glow);margin-bottom:10px}
.beast-pill-tag{display:inline-block;font-size:11px;padding:3px 14px;border-radius:10px;letter-spacing:1px}

.res-section{border-top:1px solid var(--border);padding-top:16px;margin-top:16px}
.res-label{font-size:10px;color:var(--muted);letter-spacing:3px;margin-bottom:8px;display:flex;align-items:center;gap:6px}
.res-label::after{content:'';flex:1;height:1px;background:linear-gradient(90deg,var(--dim),transparent)}
.res-text{font-size:14px;line-height:1.8;color:var(--text)}
.res-remedy{font-size:14px;line-height:1.8;color:var(--gold2);font-style:italic}
.res-sign{font-size:17px;line-height:1.6;color:var(--gold3);font-weight:600;text-align:center;padding:16px;background:rgba(201,163,74,0.05);border-radius:10px;border:1px solid rgba(201,163,74,0.12)}

.result-acts{display:grid;grid-template-columns:1fr 1fr;gap:12px}
.ra{padding:12px 10px;border-radius:12px;border:1px solid var(--border);background:var(--card);color:var(--text);font-size:13px;cursor:pointer;transition:all 0.2s;text-align:center;letter-spacing:0.5px}
.ra:hover{border-color:var(--gold);color:var(--gold);background:var(--card2)}
.ra.primary{background:linear-gradient(135deg,var(--gold),#8a6020);border:none;color:#08060e;font-weight:800;letter-spacing:1px}
.ra.primary:hover{opacity:0.85;transform:translateY(-1px)}
.ra.full{grid-column:1/-1}

/* ══════════════════════════════
   YAOCHI POOL
══════════════════════════════ */
#p-pool{padding:52px 20px 80px;max-width:680px;margin:0 auto;width:100%}
.pool-hd{text-align:center;margin-bottom:24px}
.pool-title{font-size:32px;font-weight:900;letter-spacing:6px;color:var(--gold);text-shadow:0 0 20px var(--gold-glow);margin-bottom:2px}
.pool-sub{font-size:12px;color:var(--muted);letter-spacing:2px}
.pool-ornament{display:flex;align-items:center;gap:10px;margin:10px auto;width:200px;justify-content:center}
.pool-ornament span{color:var(--gold);font-size:16px}
.pool-ornament .line{flex:1;height:1px;background:linear-gradient(90deg,transparent,var(--gold),transparent)}

.pool-tabs{display:flex;gap:8px;margin-bottom:16px;flex-wrap:wrap}
.ptab{padding:5px 16px;border-radius:20px;border:1px solid var(--border);background:var(--card);color:var(--muted);font-size:12px;cursor:pointer;transition:all 0.2s;letter-spacing:1px}
.ptab.on{border-color:var(--gold);color:var(--gold);background:rgba(201,163,74,0.08)}

.sell-entry{display:block;width:100%;padding:13px;background:var(--card);border:1px dashed rgba(201,163,74,0.35);border-radius:14px;color:var(--gold);font-size:13px;cursor:pointer;transition:all 0.2s;text-align:center;margin-bottom:16px;letter-spacing:1px}
.sell-entry:hover{background:var(--card2);border-color:var(--gold)}

.recipe-list{display:flex;flex-direction:column;gap:14px}
.recipe{background:var(--card);border:1px solid var(--border);border-radius:16px;padding:20px;transition:all 0.25s;position:relative;overflow:hidden}
.recipe::before{content:'';position:absolute;top:0;left:0;width:3px;height:100%;border-radius:2px 0 0 2px}
.recipe.zhu::before{background:linear-gradient(180deg,var(--zhu2),transparent)}
.recipe.qing::before{background:linear-gradient(180deg,var(--qing2),transparent)}
.recipe.both::before{background:linear-gradient(180deg,var(--gold2),transparent)}
.recipe:hover{border-color:rgba(201,163,74,0.35);transform:translateY(-2px);box-shadow:0 12px 40px rgba(0,0,0,0.4)}
.recipe-meta{display:flex;justify-content:space-between;align-items:center;margin-bottom:10px}
.recipe-beast{font-size:12px;color:var(--muted);display:flex;align-items:center;gap:5px}
.recipe-price{font-size:22px;font-weight:800;color:var(--gold)}
.recipe-price-u{font-size:11px;color:var(--muted);margin-left:1px}
.recipe-name{font-size:16px;font-weight:700;margin-bottom:6px;color:var(--text)}
.recipe-symptom{font-size:13px;color:var(--muted);line-height:1.6;margin-bottom:10px}
.recipe-sign{font-size:13px;color:var(--gold2);font-style:italic;border-left:2px solid rgba(201,163,74,0.4);padding-left:10px;margin-bottom:14px}
.recipe-foot{display:flex;justify-content:space-between;align-items:center}
.rxns{display:flex;gap:6px}
.rxn{background:var(--card2);border:1px solid var(--border);border-radius:8px;padding:3px 9px;font-size:11px;cursor:pointer;transition:all 0.2s;color:var(--muted)}
.rxn:hover{border-color:var(--gold);color:var(--gold)}
.rxn.lit{border-color:var(--gold);color:var(--gold);background:rgba(201,163,74,0.08)}
.btn-buy-r{background:linear-gradient(135deg,var(--gold),#8a6020);border:none;border-radius:8px;padding:6px 16px;font-size:12px;font-weight:700;color:#08060e;cursor:pointer;transition:all 0.2s;letter-spacing:1px}
.btn-buy-r:hover{opacity:0.85}
.btn-buy-r:disabled{opacity:0.35;cursor:default;background:#3a2e20;color:var(--muted)}
.owned-tag{font-size:11px;color:var(--qing2);letter-spacing:1px}
.mine-tag{font-size:11px;color:var(--muted);letter-spacing:1px}

/* ── 底部导航 ── */
.bottom-nav{position:fixed;bottom:0;left:0;right:0;z-index:50;background:rgba(8,6,14,0.96);border-top:1px solid var(--border);display:flex;justify-content:center;backdrop-filter:blur(12px)}
.bnav{flex:1;max-width:110px;padding:10px 6px;background:none;border:none;color:var(--muted);font-size:10px;cursor:pointer;transition:all 0.2s;display:flex;flex-direction:column;align-items:center;gap:3px;letter-spacing:1px}
.bnav .bi{font-size:20px}
.bnav.on{color:var(--gold)}
.bnav:hover{color:var(--text)}

/* ── 顶栏 ── */
.top-bar{position:fixed;top:0;left:0;right:0;z-index:40;background:rgba(8,6,14,0.94);border-bottom:1px solid var(--border);padding:8px 20px;display:none;justify-content:space-between;align-items:center;backdrop-filter:blur(10px)}
.top-bar.vis{display:flex}
.tb-logo{font-size:14px;color:var(--gold);font-weight:800;letter-spacing:3px}
.tb-bal{font-size:13px;color:var(--gold);font-weight:700}
.tb-bal span{font-size:11px;color:var(--muted);margin-right:3px}

.main-pad{padding-top:50px;padding-bottom:72px}

/* ── 弹窗 ── */
.overlay{display:none;position:fixed;inset:0;background:rgba(0,0,0,0.82);backdrop-filter:blur(8px);z-index:100;align-items:center;justify-content:center;padding:20px}
.overlay.vis{display:flex}
.modal{background:linear-gradient(180deg,var(--card) 0%,var(--bg2) 100%);border:1px solid rgba(201,163,74,0.3);border-radius:20px;padding:28px;max-width:440px;width:100%;animation:mslide 0.25s ease;position:relative}
.modal::before{content:'';position:absolute;top:0;left:0;right:0;height:3px;background:linear-gradient(90deg,var(--zhu),var(--gold),var(--qing2));border-radius:20px 20px 0 0}
@keyframes mslide{from{opacity:0;transform:scale(0.92) translateY(12px)}to{opacity:1;transform:none}}
.modal-title{font-size:18px;color:var(--gold);font-weight:800;letter-spacing:2px;margin-bottom:4px}
.modal-sub{font-size:12px;color:var(--muted);margin-bottom:20px;letter-spacing:1px}
.fg{margin-bottom:14px}
.fg label{font-size:11px;color:var(--muted);display:block;margin-bottom:5px;letter-spacing:2px}
.fg input,.fg textarea,.fg select{width:100%;background:var(--card2);border:1px solid var(--border);border-radius:10px;padding:10px 14px;color:var(--text);font-size:14px;font-family:inherit;transition:border-color 0.2s}
.fg input:focus,.fg textarea:focus,.fg select:focus{outline:none;border-color:var(--gold)}
.fg textarea{height:70px;resize:none}
.fg-row{display:grid;grid-template-columns:1fr 1fr;gap:12px}
.mbtns{display:flex;gap:10px;margin-top:20px}
.mb-cancel{flex:1;background:var(--card2);border:1px solid var(--border);border-radius:12px;padding:11px;color:var(--muted);font-size:14px;cursor:pointer;transition:all 0.2s}
.mb-cancel:hover{border-color:var(--muted);color:var(--text)}
.mb-ok{flex:2;background:linear-gradient(135deg,var(--gold),#8a6020);border:none;border-radius:12px;padding:11px;color:#08060e;font-size:14px;font-weight:800;cursor:pointer;letter-spacing:1px;transition:opacity 0.2s}
.mb-ok:hover{opacity:0.85}
.ok-center{text-align:center}
.ok-ico{font-size:52px;margin-bottom:12px}
.ok-title{font-size:18px;color:var(--qing2);font-weight:800;letter-spacing:2px;margin-bottom:8px}
.ok-msg{font-size:13px;color:var(--muted);line-height:1.8}

/* toast */
.toast{position:fixed;bottom:82px;left:50%;transform:translateX(-50%) translateY(6px);background:var(--card2);border:1px solid var(--border);border-radius:12px;padding:9px 20px;font-size:13px;color:var(--text);opacity:0;transition:all 0.3s;z-index:200;pointer-events:none;white-space:nowrap}
.toast.vis{opacity:1;transform:translateX(-50%) translateY(0)}

@media(max-width:480px){
  .pill-row{flex-direction:column;align-items:center}
  .pill-btn{width:100%;max-width:280px}
  .intro-title{font-size:36px}
  .beast-nm{font-size:28px}
  .result-acts{grid-template-columns:1fr}
  .ra.full{grid-column:1}
}
</style>
</head>
<body>

<!-- 星尘 -->
<div id="stardust"></div>
<!-- 月亮 -->
<div id="moon"></div>
<!-- 竹影 -->
<div id="bamboo-bg"></div>
<!-- 音乐按钮 -->
<button id="music-btn" onclick="toggleMusic()" title="仙乐">🎵</button>

<!-- 顶栏 -->
<div class="top-bar" id="topbar">
  <span class="tb-logo">后悔小卖部</span>
  <span class="tb-bal"><span>药钱</span><span id="bal-val">800</span> 两</span>
</div>

<!-- ═══ 首页 ═══ -->
<div class="page active" id="p-intro">
  <div class="intro-inner" style="min-height:100vh;display:flex;flex-direction:column;align-items:center;justify-content:center;padding:40px 20px;text-align:center">
    <div class="ink-circle" id="moon-circle"><span class="shop-ico" id="moon-phase">🌑</span><span id="beast-in-moon" style="position:absolute;font-size:28px;opacity:0;bottom:26px;right:20px;transition:opacity 0.8s ease"></span></div>

let musicOn=false,_mCtx=null,_mTimer=null;
function _playFlute(){
  const AC=window.AudioContext||window.webkitAudioContext;
  if(!AC)return 20000;
  const ctx=new AC();
  const out=ctx.createGain();out.gain.value=0.5;out.connect(ctx.destination);
  const rev=ctx.createDelay(0.6);const rfb=ctx.createGain();rfb.gain.value=0.18;
  rev.connect(rfb);rfb.connect(rev);rev.connect(out);
  function n(f,w,d,v=0.06){
    const o=ctx.createOscillator(),g=ctx.createGain();
    const o2=ctx.createOscillator(),g2=ctx.createGain();
    o.type='sine';o.frequency.value=f;
    o2.type='sine';o2.frequency.value=f*3;g2.gain.value=0.07;
    g.gain.setValueAtTime(0,w);
    g.gain.linearRampToValueAtTime(v,w+0.15);
    g.gain.setValueAtTime(v*0.8,w+d*0.65);
    g.gain.exponentialRampToValueAtTime(0.001,w+d);
    o.connect(g);g.connect(out);g.connect(rev);
    o2.connect(g2);g2.connect(out);
    o.start(w);o.stop(w+d+0.1);o2.start(w);o2.stop(w+d+0.1);
  }
  // D宫五声: D4 F#4 A4 B4 D5
  const S=[293.66,369.99,440.00,493.88,587.33,659.25,739.99];
  const sc=[
    [S[2],0,2.2,0.06],[S[1],2.2,1.0,0.05],[S[0],3.2,1.6,0.04],
    [S[3],5.0,1.4,0.06],[S[4],6.4,1.2,0.07],[S[5],7.6,2.0,0.06],
    [S[4],9.8,1.0,0.05],[S[2],10.8,0.8,0.04],[S[1],11.6,0.8,0.04],[S[0],12.4,2.2,0.05],
    [S[3],14.8,1.0,0.05],[S[5],15.8,0.8,0.06],[S[6],16.6,1.8,0.07],[S[5],18.4,3.0,0.04],
  ];
  const T=21.8;
  sc.forEach(a=>n(...a));
  n(S[0]*0.5,0,T,0.022);
  return {ctx,ms:T*1000};
}
function startMusic(){
  if(_mCtx){try{_mCtx.close();}catch(e){}}_mCtx=null;
  const {ctx,ms}=_playFlute();_mCtx=ctx;
  if(musicOn)_mTimer=setTimeout(startMusic,ms-400);
}
function stopMusic(){
  clearTimeout(_mTimer);
  if(_mCtx){try{_mCtx.close();}catch(e){}}_mCtx=null;
}

function choosePill(type){
  pill=type; answers=[]; curQ=0;
  $('qz-badge').textContent=type==='zhu'?'❤️ 朱砂丸问诊':'💙 忘忧丸问诊';
  $('qz-badge').className='qz-badge '+(type==='zhu'?'zhu':'qing');
  renderQ();
  navTo('p-quiz','bnav-quiz');
}
function renderQ(){
  const q=QS[curQ], tot=QS.length, pct=Math.round(((curQ+1)/tot)*100);
  $('prog-txt').textContent=`炼药进度：${curQ+1} / ${tot}`;
  $('prog-pct').textContent=pct+'%';
  $('prog-fill').style.width=pct+'%';
  $('qnum').textContent='Q'+(curQ+1)+' ';
  $('qtxt').textContent=q.q;
  $('opts-list').innerHTML=q.opts.map((o,i)=>`<button class="opt-item" onclick="pickOpt(this,${i})"><span class="opt-key">${String.fromCharCode(65+i)}</span>${o}</button>`).join('');
  $('btn-next').classList.remove('on');
}
function pickOpt(el,idx){
  document.querySelectorAll('.opt-item').forEach(b=>b.classList.remove('chosen'));
  el.classList.add('chosen'); el._idx=idx;
  $('btn-next').classList.add('on');
}
function nextQ(){
  const sel=document.querySelector('.opt-item.chosen');
  if(!sel)return;
  answers.push({q:curQ,w:QS[curQ].w[sel._idx]});
  curQ++;
  if(curQ>=QS.length){calcResult();return;}
  renderQ();
}
function backToHome(){pill='';answers=[];curQ=0;navTo('p-intro','bnav-home')}
function resetAll(){pill='';answers=[];curQ=0;navTo('p-intro','bnav-home')}

function calcResult(){
  const pool=BEASTS.filter(b=>b.type==='both'||b.type===pill);
  const total=answers.reduce((s,a)=>s+a.w,0);
  curBeast=pool[total%pool.length];
  $('r-ico').textContent=curBeast.emoji;
  $('r-nm').textContent=curBeast.name;
  const pt=$('r-ptag');
  if(pill==='zhu'){pt.textContent='朱砂丸系';pt.style.cssText='background:rgba(155,35,53,0.15);color:#d4455a;border:1px solid rgba(155,35,53,0.3);border-radius:10px;font-size:11px;padding:3px 14px;letter-spacing:2px'}
  else{pt.textContent='忘忧丸系';pt.style.cssText='background:rgba(26,53,112,0.15);color:#2da88a;border:1px solid rgba(26,53,112,0.35);border-radius:10px;font-size:11px;padding:3px 14px;letter-spacing:2px'}
  $('r-symptom').textContent=curBeast.symptom;
  $('r-merit').textContent=curBeast.merit;
  $('r-remedy').textContent=curBeast.remedy;
  $('r-sign').textContent='「'+curBeast.sign+'」';
  navTo('p-result','bnav-result');
}

// ── 瑶池 ──
function renderPool(){
  let data=POOL;
  if(poolFilter==='zhu')data=POOL.filter(r=>r.type==='zhu');
  else if(poolFilter==='qing')data=POOL.filter(r=>r.type==='qing'||r.type==='both');
  else if(poolFilter==='mine')data=POOL.filter(r=>r.mine||myBox.includes(r.id));
  const el=$('recipe-list');
  if(!data.length){el.innerHTML='<div style="text-align:center;padding:48px;color:var(--muted);letter-spacing:1px">此处尚空，快去问诊炼药 🏮</div>';return}
  el.innerHTML=data.map(r=>{
    const owned=myBox.includes(r.id);
    const tl=r.type==='zhu'?'❤️ 朱砂系':r.type==='qing'?'💙 忘忧丸系':'✨ 通用';
    return`<div class="recipe ${r.type}">
      <div class="recipe-meta">
        <span class="recipe-beast"><span style="font-size:16px">${r.bIco}</span>${r.beast} · ${tl}</span>
        <span class="recipe-price">${r.price}<span class="recipe-price-u"> 两</span></span>
      </div>
      <div class="recipe-name">《${r.name}》</div>
      <div class="recipe-symptom">${r.symptom}</div>
      <div class="recipe-sign">「${r.sign}」</div>
      <div class="recipe-foot">
        <div class="rxns">
          <button class="rxn ${r.rxn._s?'lit':''}" onclick="react(${r.id},'sugar',this)">🍬 ${r.rxn.sugar}</button>
          <button class="rxn ${r.rxn._p?'lit':''}" onclick="react(${r.id},'paper',this)">🧻 ${r.rxn.paper}</button>
          <button class="rxn ${r.rxn._h?'lit':''}" onclick="react(${r.id},'ha',this)">哈哈 ${r.rxn.ha}</button>
        </div>
        ${owned?'<span class="owned-tag">✓ 已收入药匣</span>':r.mine?'<span class="mine-tag">我的药方</span>':`<button class="btn-buy-r" onclick="openBuyModal(${r.id})"${bal<r.price?' disabled':''}>收入药匣</button>`}
      </div>
    </div>`
  }).join('');
}
function filterPool(f,btn){
  poolFilter=f;
  document.querySelectorAll('.ptab').forEach(b=>b.classList.remove('on'));
  btn.classList.add('on');
  renderPool();
}
function react(id,key,btn){
  const r=POOL.find(x=>x.id===id);if(!r)return;
  const k={'sugar':'_s','paper':'_p','ha':'_h'}[key];
  const kn={'sugar':'sugar','paper':'paper','ha':'ha'}[key];
  const ico={'sugar':'🍬 ','paper':'🧻 ','ha':'哈哈 '}[key];
  if(r.rxn[k]){r.rxn[kn]--;r.rxn[k]=false;btn.classList.remove('lit')}
  else{r.rxn[kn]++;r.rxn[k]=true;btn.classList.add('lit')}
  btn.textContent=ico+r.rxn[kn];
}
function openBuyModal(id){
  const r=POOL.find(x=>x.id===id);if(!r)return;
  buyId=id;
  $('bm-name').textContent='《'+r.name+'》';
  $('bm-meta').textContent=r.beast+' '+r.bIco+' · '+(r.type==='zhu'?'朱砂丸系':'忘忧丸系');
  $('bm-symptom').textContent=r.symptom;
  $('bm-sign').textContent='「'+r.sign+'」';
  $('bm-price').textContent=r.price+' 两';
  const btn=$('bm-confirm');
  btn.disabled=bal<r.price;
  btn.textContent=bal<r.price?'药钱不足':'收入药匣';
  $('buy-overlay').classList.add('vis');
}
function confirmBuy(){
  const r=POOL.find(x=>x.id===buyId);if(!r||myBox.includes(r.id))return;
  bal-=r.price;updateBal();myBox.push(r.id);
  closeOverlay('buy-overlay');renderPool();
  showOk('🎴','药方入匣',`《${r.name}》已收入药匣。\n\n「${r.sign}」\n\n剩余药钱：${bal} 两`);
}
function openSellModal(){$('sell-overlay').classList.add('vis')}
function openSellFromResult(){
  if(!curBeast)return;
  $('s-name').value=curBeast.name+'后悔药';
  $('s-symptom').value='';$('s-sign').value=curBeast.sign;
  $('s-type').value=pill;$('s-price').value='';
  $('sell-overlay').classList.add('vis');
}
function confirmSell(){
  const name=$('s-name').value.trim(),symptom=$('s-symptom').value.trim(),sign=$('s-sign').value.trim();
  const type=$('s-type').value,price=parseInt($('s-price').value);
  if(!name){showToast('药方名称不能为空');return}
  if(!symptom){showToast('适用症状写一下嘛');return}
  if(!price||price<10){showToast('价格至少10两');return}
  const b=curBeast||BEASTS[0];
  POOL.unshift({id:Date.now(),name,symptom,sign:sign||'此药方有效，亲测。',type,beast:b.name,bIco:b.emoji,price,rxn:{sugar:0,paper:0,ha:0},owned:false,mine:true});
  closeOverlay('sell-overlay');
  $('s-name').value='';$('s-symptom').value='';$('s-sign').value='';$('s-price').value='';
  renderPool();
  showOk('📌','药方已挂牌',`《${name}》已入瑶池，定价 ${price} 两。\n\n等一个有缘人。`);
  navTo('p-pool','bnav-pool');
}


// 月相与导航联动
const MOON_PHASES={'p-intro':'🌑','p-quiz':'🌙','p-result':'🌕','p-pool':'🌘'};
function updateMoon(pageId){
  const mp=document.getElementById('moon-phase');
  if(mp&&MOON_PHASES[pageId])mp.textContent=MOON_PHASES[pageId];
  if(pageId==='p-result'){
    setTimeout(()=>{
      const bm=document.getElementById('beast-in-moon');
      if(bm&&curBeast){bm.textContent=curBeast.emoji;bm.style.opacity='0.7';}
    },400);
  } else {
    const bm=document.getElementById('beast-in-moon');
    if(bm)bm.style.opacity='0';
  }
}
renderPool();updateBal();
// 首次点击自动播放音乐
document.addEventListener("click",function startOnce(){
  toggleMusic();
},{once:true});
</script>
